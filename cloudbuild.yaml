steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/basket-stats-api:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/basket-stats-api:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/basket-stats-api:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - basket-stats-api
      - --image=gcr.io/$PROJECT_ID/basket-stats-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=ASPNETCORE_ENVIRONMENT=Production

images:
  - gcr.io/$PROJECT_ID/basket-stats-api:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/basket-stats-api:latest
